version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - uploads:/app/uploads
      - jobs:/app/jobs
      - output:/app/output
    environment:
      - MAX_CONCURRENT_JOBS=3
      - JOB_EXPIRY_SECONDS=3600
      - RENDERIQ_ENV=production
      - RENDERIQ_ADMIN_KEY=${RENDERIQ_ADMIN_KEY:-changeme-in-production}
    networks:
      - internal
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - internal
    restart: unless-stopped

networks:
  internal:

volumes:
  uploads:
  jobs:
  output:
